
services:
  brainstem:
    build:
      context: ..
      dockerfile: docker/brainstem.Dockerfile
    container_name: brainstem_4070
    restart: unless-stopped
    ports:
      # Sprint 3c: bind on the HOST side to the Tailscale interface only.
      # ${BRAINSTEM_BIND_HOST} comes from docker/.env on the 4070
      # (operator writes the result of `tailscale ip -4`). Defaults to
      # 127.0.0.1 so a fresh checkout still runs end to end on a laptop
      # without a Tailscale install. Inside the container we still bind
      # 0.0.0.0 so embedder/nas can reach us over the compose bridge.
      # See docs/exposure_and_cortex_down.md for the design.
      - "${BRAINSTEM_BIND_HOST:-127.0.0.1}:5001:5001"
    environment:
      - BRAINSTEM_DEVICE=cpu
      # 4090 Cortex inference peer (vLLM OpenAI-compatible API) over the LAN.
      - BRAINSTEM_CORTEX_URL=http://192.168.1.140:8000
      # NAS memory service, reached by compose-network DNS.
      - BRAINSTEM_NAS_URL=http://nas_memory:5002
      # Embedder service, reached by compose-network DNS.
      - BRAINSTEM_EMBEDDER_URL=http://embedder_4070:5003
      # Sprint 3b: bearer-token store for the auth middleware. File lives
      # on the auth_data named volume; mint tokens via
      # `docker compose exec brainstem python scripts/create_token.py --name <client>`.
      - BRAINSTEM_TOKEN_STORE_PATH=/data/auth/tokens.json
      # Phase 0 metric harness: which fabric components are live this run.
      - NEXUS_BUILD_STATE=brainstem+cortex+nas+embedder
    volumes:
      # Phase 0 metric harness JSONL sink, persisted on the 4070 SSD.
      - ../data/metrics:/data/metrics
      # Sprint 3b: hashed token registry. Named volume so it survives
      # container rebuilds and is the unit of backup / wipe.
      - auth_data:/data/auth
    depends_on:
      - nas
      - embedder
    networks:
      - nexusnet
    healthcheck:
      # Sprint 3c: liveness probe that does not depend on Cortex. /health
      # only checks the embedder, so the brainstem reports healthy even
      # during a Cortex outage (which is the whole point of the new 503
      # path). We run the check inside the container against the
      # in-container bind, not against the host-side Tailscale port.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=3).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  embedder:
    build:
      context: ..
      dockerfile: docker/embedder.Dockerfile
    container_name: embedder_4070
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      - EMBEDDER_DEVICE=cpu
      - EMBEDDER_CHROMA_PERSIST_DIR=/chroma
      - EMBEDDER_CHROMA_COLLECTION=memory
    volumes:
      # Persistent Chroma collection. Named volume so it survives
      # container rebuilds and is the unit of backup / wipe.
      - chroma_data:/chroma
    networks:
      - nexusnet

  nas:
    build:
      context: ..
      dockerfile: docker/nas.Dockerfile
    container_name: nas_memory
    restart: unless-stopped
    ports:
      - "5002:5002"
    volumes:
      - ../data/nas:/data/nas
    networks:
      - nexusnet


volumes:
  chroma_data:
  # Sprint 3b: hashed bearer-token store for the brainstem auth
  # middleware. Survives container restart and rebuild. Backed up by
  # backing up the docker volume.
  auth_data:


networks:
  nexusnet:
    driver: bridge
