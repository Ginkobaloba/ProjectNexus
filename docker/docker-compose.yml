
services:
  brainstem:
    build:
      context: ..
      dockerfile: docker/brainstem.Dockerfile
    container_name: brainstem_4070
    ports:
      - "5001:5001"
    environment:
      - BRAINSTEM_DEVICE=cpu
      # 4090 Cortex inference peer (vLLM OpenAI-compatible API) over the LAN.
      - BRAINSTEM_CORTEX_URL=http://192.168.1.140:8000
    networks:
      - nexusnet

  nas:
    build:
      context: ..
      dockerfile: docker/nas.Dockerfile
    container_name: nas_memory
    ports:
      - "5002:5002"
    volumes:
      - ../data/nas:/data/nas
    networks:
      - nexusnet


networks:
  nexusnet:
    driver: bridge
