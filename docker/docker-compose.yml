
services:
  brainstem:
    build:
      context: ..
      dockerfile: docker/brainstem.Dockerfile
    container_name: brainstem_4070
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - BRAINSTEM_DEVICE=cpu
      # 4090 Cortex inference peer (vLLM OpenAI-compatible API) over the LAN.
      - BRAINSTEM_CORTEX_URL=http://192.168.1.140:8000
      # NAS memory service, reached by compose-network DNS.
      - BRAINSTEM_NAS_URL=http://nas_memory:5002
      # Embedder service, reached by compose-network DNS.
      - BRAINSTEM_EMBEDDER_URL=http://embedder_4070:5003
      # Sprint 3b: bearer-token store for the auth middleware. File lives
      # on the auth_data named volume; mint tokens via
      # `docker compose exec brainstem python scripts/create_token.py --name <client>`.
      - BRAINSTEM_TOKEN_STORE_PATH=/data/auth/tokens.json
      # Phase 0 metric harness: which fabric components are live this run.
      - NEXUS_BUILD_STATE=brainstem+cortex+nas+embedder
    volumes:
      # Phase 0 metric harness JSONL sink, persisted on the 4070 SSD.
      - ../data/metrics:/data/metrics
      # Sprint 3b: hashed token registry. Named volume so it survives
      # container rebuilds and is the unit of backup / wipe.
      - auth_data:/data/auth
    depends_on:
      - nas
      - embedder
    networks:
      - nexusnet

  embedder:
    build:
      context: ..
      dockerfile: docker/embedder.Dockerfile
    container_name: embedder_4070
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      - EMBEDDER_DEVICE=cpu
      - EMBEDDER_CHROMA_PERSIST_DIR=/chroma
      - EMBEDDER_CHROMA_COLLECTION=memory
    volumes:
      # Persistent Chroma collection. Named volume so it survives
      # container rebuilds and is the unit of backup / wipe.
      - chroma_data:/chroma
    networks:
      - nexusnet

  nas:
    build:
      context: ..
      dockerfile: docker/nas.Dockerfile
    container_name: nas_memory
    restart: unless-stopped
    ports:
      - "5002:5002"
    volumes:
      - ../data/nas:/data/nas
    networks:
      - nexusnet


volumes:
  chroma_data:
  # Sprint 3b: hashed bearer-token store for the brainstem auth
  # middleware. Survives container restart and rebuild. Backed up by
  # backing up the docker volume.
  auth_data:


networks:
  nexusnet:
    driver: bridge
